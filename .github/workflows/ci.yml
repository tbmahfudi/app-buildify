name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install flake8 black isort
      - name: Run flake8
        run: flake8 backend/app --max-line-length=120 --extend-ignore=E203,W503
      - name: Run black (check)
        run: black --check backend/app
      - name: Run isort (check)
        run: isort --check-only backend/app

  tenant-scope-gate:
    name: Tenant Scope Gate
    runs-on: ubuntu-latest
    # Intentionally NOT gated on lint: the backend carries a large pre-existing
    # flake8/black/isort debt (tracked separately) that kept lint red, which was
    # silently skipping this security gate and the test suite. Decoupled so the
    # gate and tests run on every PR while the lint debt is paid down.
    steps:
      - uses: actions/checkout@v4
      - name: Check for raw tenant_id == literals (T-22.022)
        # Counts unannotated raw '.tenant_id ==' literals in services/ and
        # routers/ and fails the build when the count exceeds the frozen
        # baseline of 36 (router-layer M-2 follow-up, tracked for sprint N+1).
        # Lines annotated with '# tenant-scope-ok' are accepted. Any NEW
        # unannotated literal pushes the count above baseline and breaks the
        # build. See docs/backend/TENANT_SCOPE_MIGRATION.md for the convention.
        run: bash manage.sh check-tenant-scope

  js-syntax:
    name: JS Syntax
    runs-on: ubuntu-latest
    # Decoupled from lint (see tenant-scope-gate note above).
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Parse-check all frontend JavaScript
        # node --check on every frontend JS file. Catches heredoc-escaping
        # artifacts (\` / \${ in template literals), truncated/duplicated
        # blocks, and other invalid JS that only fails at module load.
        run: bash scripts/check-js-syntax.sh

  test:
    name: Tests (e2e)
    runs-on: ubuntu-latest
    needs: tenant-scope-gate
    # The suite in backend/tests/ is a black-box e2e harness (pytest + httpx, no
    # app imports) that runs against a LIVE stack — it aborts immediately if
    # http://localhost:8000 is unreachable. The old job just ran `pytest tests/`
    # with nothing up, so it always failed at collection (GH#676). Stand up the
    # dev stack the same way developers do, then run the suite inside the backend
    # container (--confcutdir=tests/e2e is required; the in-process
    # tests/conftest.py fails to import on the built image).
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
      - name: Stand up dev stack (build + start + migrate + seed)
        run: bash manage.sh setup postgres
      - name: Run e2e suite (inside backend container)
        run: docker exec app_buildify_backend python -m pytest tests/e2e --confcutdir=tests/e2e -v --tb=short
      - name: Stack diagnostics (on failure)
        if: failure()
        run: |
          docker compose -f infra/docker-compose.dev.yml ps || true
          docker logs app_buildify_backend --tail 300 || true
      - name: Tear down
        if: always()
        run: docker compose -f infra/docker-compose.dev.yml down -v || true
