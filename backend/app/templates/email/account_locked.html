<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Account Locked — {{tenant_name}}</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:0;}
    .wrapper{max-width:600px;margin:30px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .header{background:#92400E;padding:24px 32px;}.header h1{color:#fff;margin:0;font-size:22px;}
    .body{padding:32px;}.body p{color:#374151;line-height:1.6;margin:0 0 16px;}
    .btn{display:inline-block;padding:12px 24px;background:#92400E;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;}
    .footer{background:#f9fafb;padding:16px 32px;text-align:center;font-size:12px;color:#6B7280;}
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header"><h1>Account Locked</h1></div>
  <div class="body">
    <p>Hello {{user_name}},</p>
    <p>Your account has been locked due to multiple failed login attempts. Click below to unlock your account.</p>
    <p><a class="btn" href="{{action_url}}">Unlock Account</a></p>
    <p>If you did not attempt to log in, please contact your administrator immediately.</p>
  </div>
  <div class="footer">&copy; {{tenant_name}}. All rights reserved.</div>
</div>
</body>
</html>
