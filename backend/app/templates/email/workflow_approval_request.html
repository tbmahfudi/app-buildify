<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Approval Required — {{tenant_name}}</title>
  <style>
    body{font-family:Arial,sans-serif;background:#f4f4f4;margin:0;padding:0;}
    .wrapper{max-width:600px;margin:30px auto;background:#fff;border-radius:8px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.08);}
    .header{background:#2563EB;padding:24px 32px;}.header h1{color:#fff;margin:0;font-size:22px;}
    .body{padding:32px;}.body p{color:#374151;line-height:1.6;margin:0 0 16px;}
    .meta-box{background:#EFF6FF;border-left:4px solid #2563EB;padding:12px 16px;border-radius:4px;margin-bottom:16px;}
    .meta-box p{margin:4px 0;color:#1E40AF;font-size:14px;}
    .btn{display:inline-block;padding:12px 24px;background:#2563EB;color:#fff;text-decoration:none;border-radius:6px;font-weight:bold;}
    .footer{background:#f9fafb;padding:16px 32px;text-align:center;font-size:12px;color:#6B7280;}
  </style>
</head>
<body>
<div class="wrapper">
  <div class="header"><h1>Approval Required</h1></div>
  <div class="body">
    <p>Hello {{user_name}},</p>
    <p>Your approval is required for the following workflow:</p>
    <div class="meta-box">
      <p><strong>Workflow:</strong> {{workflow_name}}</p>
      <p><strong>Record:</strong> {{record_name}}</p>
    </div>
    <p><a class="btn" href="{{action_url}}">Review &amp; Approve</a></p>
  </div>
  <div class="footer">&copy; {{tenant_name}}. All rights reserved.</div>
</div>
</body>
</html>
