[flake8]
max-line-length = 120
# Ignore rationale:
#   E203, W503     - black compatibility (black owns whitespace/line breaks)
#   E501           - line length is owned by black (max-line-length=120); the few
#                    residual long lines are strings/URLs black won't wrap
#   E711, E712     - '== None' / '== False' are the correct, intentional idiom in
#                    SQLAlchemy query filters (compile to IS NULL / = false)
#   E402           - module-level imports after sys.path setup / conditional imports
#                    (common in the seed & script entrypoints)
#   E722, E731, E741, F841 - accepted legacy style (bare excepts, a lambda assign,
#                    one ambiguous name, unused locals); tracked for incremental
#                    tightening rather than a risky mass rewrite
extend-ignore = E203, W503, E501, E711, E712, E402, E722, E731, E741, F841
# alembic migrations are generated / mechanical and are not style-linted.
exclude = .git, __pycache__, alembic, build, dist, .venv
per-file-ignores =
    # Package re-exports via star imports (intentional public surface).
    app/seeds/__init__.py: F401, F403
    # Duplicate class names shadow earlier definitions (PublishEntityRequest /
    # MigrationResponse) — a real latent issue to reconcile separately, not a
    # mechanical lint fix.
    app/schemas/data_model.py: F811

[isort]
profile = black
line_length = 120
skip_glob = */alembic/*
