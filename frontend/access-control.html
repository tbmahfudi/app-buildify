<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Control Manager | App Buildify</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        }

        .access-tab {
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
        }

        .access-tab.active {
            background-color: white !important;
            color: rgb(29, 78, 216) !important; /* blue-700 */
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .access-tab:not(.active) {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .access-tab:not(.active):hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-gray-50">
    <!-- Header -->
    <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-lg flex items-center justify-center">
                        <i class="ph-duotone ph-shield-check text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="text-xl font-bold text-gray-900">Access Control Manager</h1>
                        <p class="text-xs text-gray-500">Manage roles and permissions</p>
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-sm text-gray-600" id="current-user">Loading...</span>
                    <button onclick="logout()" class="p-2 text-gray-600 hover:text-gray-900 hover:bg-gray-100 rounded-lg transition-colors">
                        <i class="ph ph-sign-out text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Loading State -->
        <div id="loading-container" class="flex items-center justify-center py-20">
            <div class="text-center">
                <i class="ph ph-spinner-gap animate-spin text-6xl text-blue-600 mb-4"></i>
                <p class="text-gray-600">Loading Access Control Manager...</p>
            </div>
        </div>

        <!-- Tab Navigation -->
        <div id="tab-navigation" class="bg-gradient-to-r from-blue-600 to-indigo-700 rounded-xl shadow-lg mb-6 p-4 hidden">
            <nav class="flex gap-2 flex-wrap" role="tablist">
                <button id="tab-user-roles" class="access-tab active px-4 py-2.5 text-sm font-medium rounded-lg transition-all bg-white text-blue-700 shadow-md">
                    <i class="ph-duotone ph-user-gear mr-2"></i>User → Roles
                </button>
                <button id="tab-role-permissions" class="access-tab px-4 py-2.5 text-sm font-medium rounded-lg transition-all bg-white/20 text-white hover:bg-white/30">
                    <i class="ph-duotone ph-shield-star mr-2"></i>Role → Permissions
                </button>
                <button id="tab-matrix" class="access-tab px-4 py-2.5 text-sm font-medium rounded-lg transition-all bg-white/20 text-white hover:bg-white/30">
                    <i class="ph-duotone ph-table mr-2"></i>Permission Matrix
                </button>
            </nav>
        </div>

        <!-- Content Containers -->
        <div id="content-container" class="hidden">
            <!-- User → Roles View -->
            <div id="content-user-roles" class="access-content">
                <!-- User → Roles assignment view -->
            </div>

            <!-- Role → Permissions View -->
            <div id="content-role-permissions" class="access-content hidden">
                <!-- Role → Permissions assignment view -->
            </div>

            <!-- Permission Matrix View -->
            <div id="content-matrix" class="access-content hidden">
                <!-- Permission Matrix view -->
            </div>
        </div>

        <!-- Error State -->
        <div id="error-container" class="hidden">
            <div class="bg-red-50 border border-red-200 rounded-lg p-6 text-center">
                <i class="ph-duotone ph-warning-circle text-6xl text-red-600 mb-4"></i>
                <h3 class="text-lg font-semibold text-red-900 mb-2">Failed to Load</h3>
                <p class="text-red-700 mb-4" id="error-message">An error occurred while loading the access control manager.</p>
                <button onclick="location.reload()" class="px-4 py-2 bg-red-600 text-white rounded-lg hover:bg-red-700 transition-colors">
                    Try Again
                </button>
            </div>
        </div>
    </main>

    <!-- Toast Notifications Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 space-y-2"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-lg p-6 shadow-2xl">
            <i class="ph ph-spinner-gap animate-spin text-4xl text-blue-600"></i>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module">
        import { permissionAssignmentHelper } from './assets/js/rbac/index.js';

        // API base URL
        const API_BASE_URL = 'http://localhost:8000/api';

        // Current view state
        let currentView = 'user-roles';

        // Simple API client
        window.apiFetch = async function(endpoint, options = {}) {
            const token = localStorage.getItem('auth_token');

            const defaultOptions = {
                headers: {
                    'Content-Type': 'application/json',
                    ...(token ? { 'Authorization': `Bearer ${token}` } : {})
                }
            };

            const response = await fetch(`${API_BASE_URL}${endpoint}`, {
                ...defaultOptions,
                ...options,
                headers: {
                    ...defaultOptions.headers,
                    ...options.headers
                }
            });

            if (response.status === 401) {
                // Unauthorized - redirect to login
                window.location.href = '/login.html';
                throw new Error('Unauthorized');
            }

            if (!response.ok) {
                const error = await response.json().catch(() => ({ detail: 'An error occurred' }));
                throw new Error(error.detail || `HTTP ${response.status}`);
            }

            return response;
        };

        // UI utilities
        window.showToast = function(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');

            const colors = {
                success: 'bg-green-600',
                error: 'bg-red-600',
                warning: 'bg-yellow-600',
                info: 'bg-blue-600'
            };

            const icons = {
                success: 'ph-check-circle',
                error: 'ph-x-circle',
                warning: 'ph-warning',
                info: 'ph-info'
            };

            toast.className = `${colors[type]} text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-2 min-w-[300px] transform transition-all duration-300`;
            toast.innerHTML = `
                <i class="ph ${icons[type]} text-xl"></i>
                <span>${message}</span>
            `;

            container.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(100%)';
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        };

        window.showLoading = function() {
            document.getElementById('loading-overlay').classList.remove('hidden');
        };

        window.hideLoading = function() {
            document.getElementById('loading-overlay').classList.add('hidden');
        };

        window.logout = function() {
            localStorage.removeItem('auth_token');
            window.location.href = '/login.html';
        };

        // Load current user info
        async function loadCurrentUser() {
            try {
                const response = await apiFetch('/auth/me');
                const user = await response.json();

                const userEl = document.getElementById('current-user');
                userEl.textContent = user.full_name || user.email;

                return user;
            } catch (error) {
                console.error('Failed to load current user:', error);
                return null;
            }
        }

        // Setup tab navigation
        function setupTabs() {
            const tabs = document.querySelectorAll('.access-tab');

            tabs.forEach(tab => {
                tab.addEventListener('click', async () => {
                    // Update active tab styling
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');

                    // Get view name from tab id
                    const view = tab.id.replace('tab-', '');
                    currentView = view;

                    // Hide all content
                    document.querySelectorAll('.access-content').forEach(content => {
                        content.classList.add('hidden');
                    });

                    // Show selected content
                    document.getElementById(`content-${view}`).classList.remove('hidden');

                    // Load view content
                    await loadView(view);
                });
            });
        }

        // Load a specific view
        async function loadView(view) {
            try {
                showLoading();

                // Set the view in the helper
                permissionAssignmentHelper.state.view = view;

                // Render the content directly without the header
                const container = document.getElementById(`content-${view}`);
                if (container) {
                    container.innerHTML = `
                        <div class="bg-white rounded-xl shadow-lg">
                            ${permissionAssignmentHelper.renderContent()}
                        </div>
                    `;

                    // Setup event listeners for this view
                    permissionAssignmentHelper.setupEventListeners();
                }

                console.log(`✓ Loaded view: ${view}`);

            } catch (error) {
                console.error(`Error loading view ${view}:`, error);
                showToast(`Failed to load ${view} view`, 'error');
            } finally {
                hideLoading();
            }
        }

        // Initialize the application
        async function init() {
            try {
                // Load current user
                await loadCurrentUser();

                // Initialize the Permission Assignment Helper (load data)
                permissionAssignmentHelper.containerId = 'content-user-roles';
                await Promise.all([
                    permissionAssignmentHelper.loadUsers(),
                    permissionAssignmentHelper.loadRoles(),
                    permissionAssignmentHelper.loadPermissions()
                ]);

                // Hide loading, show content
                document.getElementById('loading-container').classList.add('hidden');
                document.getElementById('tab-navigation').classList.remove('hidden');
                document.getElementById('content-container').classList.remove('hidden');

                // Setup tabs
                setupTabs();

                // Load initial view
                await loadView('user-roles');

                console.log('✓ Access Control Manager initialized successfully');

            } catch (error) {
                console.error('Initialization error:', error);

                // Show error state
                document.getElementById('loading-container').classList.add('hidden');
                document.getElementById('error-container').classList.remove('hidden');
                document.getElementById('error-message').textContent = error.message || 'Failed to initialize';
            }
        }

        // Start the application when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
