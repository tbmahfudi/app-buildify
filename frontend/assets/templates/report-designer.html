<div class="report-designer-page h-screen flex flex-col overflow-hidden">
  <!-- Header -->
  <div class="bg-white border-b border-gray-200 px-6 py-3">
    <div class="flex items-center justify-between">
      <div class="flex items-center space-x-4">
        <button id="back-to-reports" class="text-gray-500 hover:text-gray-700">
          <i class="ph ph-arrow-left text-xl"></i>
        </button>
        <div>
          <h1 class="text-xl font-bold text-gray-900 flex items-center gap-2">
            <i class="ph-duotone ph-file-plus text-emerald-600"></i>
            <span id="report-title">New Report</span>
          </h1>
          <p class="text-xs text-gray-500 mt-0.5">Design and build custom reports with visual tools</p>
        </div>
      </div>
      <div class="flex items-center space-x-2">
        <button id="preview-report-btn" class="btn btn-secondary btn-sm">
          <i class="ph ph-eye mr-1.5"></i>Preview
        </button>
        <button id="save-report-btn" class="btn btn-primary btn-sm">
          <i class="ph ph-floppy-disk mr-1.5"></i>Save
        </button>
        <button id="run-report-btn" class="btn btn-success btn-sm">
          <i class="ph ph-play mr-1.5"></i>Run
        </button>
        <button id="clear-report-btn" class="btn btn-secondary btn-sm text-red-600 hover:text-red-700">
          <i class="ph ph-trash mr-1.5"></i>Clear
        </button>
      </div>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="bg-white border-b border-gray-200">
    <nav class="flex px-4 overflow-x-auto">
      <button class="tab-btn flex items-center gap-2 px-5 py-3 text-sm font-medium whitespace-nowrap border-b-2 border-blue-600 text-blue-600 transition-colors" data-step="properties">
        <i class="ph-duotone ph-note-pencil text-base"></i>
        Properties
      </button>
      <button class="tab-btn flex items-center gap-2 px-5 py-3 text-sm font-medium whitespace-nowrap border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors" data-step="data-source">
        <i class="ph-duotone ph-database text-base"></i>
        Data Source
      </button>
      <button class="tab-btn flex items-center gap-2 px-5 py-3 text-sm font-medium whitespace-nowrap border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors" data-step="columns">
        <i class="ph-duotone ph-columns text-base"></i>
        Columns
      </button>
      <button class="tab-btn flex items-center gap-2 px-5 py-3 text-sm font-medium whitespace-nowrap border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors" data-step="visualization">
        <i class="ph-duotone ph-chart-bar text-base"></i>
        Visualization
      </button>
      <button class="tab-btn flex items-center gap-2 px-5 py-3 text-sm font-medium whitespace-nowrap border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors" data-step="parameters">
        <i class="ph-duotone ph-sliders text-base"></i>
        Parameters
      </button>
      <button class="tab-btn flex items-center gap-2 px-5 py-3 text-sm font-medium whitespace-nowrap border-b-2 border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300 transition-colors" data-step="template">
        <i class="ph-duotone ph-copy text-base"></i>
        Template
      </button>
    </nav>
  </div>

  <!-- Main Content -->
  <div class="flex-1 flex overflow-hidden">
    <!-- Step Content Area -->
    <div class="flex-1 bg-gray-50 overflow-auto">

      <!-- Step 0: Properties -->
      <div id="step-properties" class="step-content p-6">
        <div class="max-w-2xl mx-auto">
          <h2 class="text-lg font-semibold text-gray-900 mb-5">Report Properties</h2>
          <div class="bg-white rounded-lg border border-gray-200 p-6 space-y-5">

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Report Name <span class="text-red-500">*</span></label>
                <input id="prop-name" type="text" class="form-input w-full" placeholder="e.g. Monthly Sales Summary" />
                <p class="text-xs text-gray-400 mt-1">Unique identifier used in the system</p>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Report Title</label>
                <input id="prop-title" type="text" class="form-input w-full" placeholder="e.g. Monthly Sales Summary Report" />
                <p class="text-xs text-gray-400 mt-1">Displayed to users at the top of the report</p>
              </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Module / Category</label>
                <input id="prop-category" type="text" class="form-input w-full" placeholder="e.g. Sales, Finance, HR" list="category-suggestions" />
                <datalist id="category-suggestions">
                  <option value="Sales">
                  <option value="Finance">
                  <option value="HR">
                  <option value="Operations">
                  <option value="Marketing">
                  <option value="Inventory">
                  <option value="General">
                </datalist>
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Report Type</label>
                <select id="prop-type" class="form-select w-full">
                  <option value="tabular">Tabular — rows &amp; columns</option>
                  <option value="summary">Summary — grouped totals</option>
                  <option value="chart">Chart — visualisation</option>
                  <option value="dashboard">Dashboard — mixed widgets</option>
                </select>
              </div>
            </div>

            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Description</label>
              <textarea id="prop-description" class="form-input w-full" rows="3" placeholder="Describe what this report shows and who should use it…"></textarea>
            </div>

            <div class="flex items-center gap-3 pt-1">
              <input id="prop-public" type="checkbox" class="checkbox" />
              <div>
                <label for="prop-public" class="text-sm font-medium text-gray-700">Make report public</label>
                <p class="text-xs text-gray-400">All users can see this report in the shared report library</p>
              </div>
            </div>

          </div>
        </div>
      </div>

      <!-- Step 1: Data Source -->
      <div id="step-data-source" class="step-content hidden p-6">
        <div class="max-w-5xl mx-auto">
          <div id="data-source-builder-container"></div>
        </div>
      </div>

      <!-- Step 2: Columns -->
      <div id="step-columns" class="step-content hidden p-6">
        <div class="max-w-5xl mx-auto space-y-6">
          <div id="column-designer-container"></div>
          <div id="group-by-designer-container"></div>
        </div>
      </div>

      <!-- Step 3: Visualization -->
      <div id="step-visualization" class="step-content hidden p-6">
        <div class="max-w-5xl mx-auto">
          <div id="chart-builder-container"></div>
        </div>
      </div>

      <!-- Step 4: Parameters -->
      <div id="step-parameters" class="step-content hidden p-6">
        <div class="max-w-5xl mx-auto">
          <div id="parameter-ui-container"></div>
        </div>
      </div>

      <!-- Step 5: Template -->
      <div id="step-template" class="step-content hidden p-6">
        <div class="max-w-5xl mx-auto">
          <div id="template-library-container"></div>
        </div>
      </div>

    </div>

    <!-- Right Sidebar: Live Preview -->
    <div class="w-80 bg-white border-l border-gray-200 flex flex-col overflow-hidden">
      <div class="flex items-center justify-between px-4 py-3 border-b border-gray-200">
        <h3 class="text-sm font-semibold text-gray-900">Live Preview</h3>
        <button id="toggle-preview-btn" class="text-gray-400 hover:text-gray-600">
          <i class="ph ph-eye-slash text-base"></i>
        </button>
      </div>
      <div id="preview-content" class="flex-1 overflow-auto p-4 bg-gray-50">
        <div class="text-center text-gray-400 mt-8">
          <i class="ph ph-file-text text-4xl mb-2"></i>
          <p class="text-sm">Configure your report to see a preview</p>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module">
  import { VisualDataSourceBuilder } from '/components/visual-data-source-builder.js';
  import { DragDropColumnDesigner } from '/components/drag-drop-column-designer.js';
  import { GroupByDesigner } from '/components/group-by-designer.js';
  import { VisualChartBuilder } from '/components/visual-chart-builder.js';
  import { EnhancedParameterUI } from '/components/enhanced-parameter-ui.js';
  import { ReportTemplateLibrary } from '/components/report-template-library.js';
  import { SplitPaneLivePreview } from '/components/split-pane-live-preview.js';
  import { apiFetch } from '/assets/js/api.js';

  class ReportDesigner {
    constructor() {
      this.reportId = null;
      this.currentStep = 0;
      this.steps = ['properties', 'data-source', 'columns', 'visualization', 'parameters', 'template'];

      this.reportData = {
        name: '',
        title: '',
        category: '',
        report_type: 'tabular',
        description: '',
        is_public: false,
        data_source: {},
        columns: [],
        query_config: { group_by: [], order_by: [], filters: {}, limit: null },
        chart_config: {},
        parameters: []
      };

      this.components = {
        dataSource: null,
        columns: null,
        groupBy: null,
        chart: null,
        parameters: null,
        template: null,
        preview: null
      };

      this.init();
    }

    async init() {
      const urlParams = new URLSearchParams(window.location.search);
      this.reportId = urlParams.get('id');

      if (this.reportId) {
        await this.loadReport(this.reportId);
      }

      this.initializeComponents();
      this.setupEventListeners();
      this.showStep(0);
    }

    initializeComponents() {
      this.components.dataSource = new VisualDataSourceBuilder(document.querySelector('#data-source-builder-container'), {
        onDataSourceChange: (dataSource) => {
          this.reportData.data_source = dataSource;
          // Update column designer to show only fields from selected entities
          const entityNames = (dataSource.entities || []).map(e =>
            typeof e === 'string' ? e : e.entity_name
          );
          if (this.components.columns) {
            this.components.columns.setEntities(entityNames);
          }
          this.updatePreview();
        }
      });

      this.components.columns = new DragDropColumnDesigner(document.querySelector('#column-designer-container'), {
        onColumnsChange: (columns) => {
          this.reportData.columns = columns;
          // Feed updated fields into GroupByDesigner so it stays in sync
          if (this.components.groupBy) {
            this.components.groupBy.setAvailableFields(columns);
          }
          this.updatePreview();
        }
      });

      this.components.groupBy = new GroupByDesigner(document.querySelector('#group-by-designer-container'), {
        onGroupByChange: (groupBy) => {
          this.reportData.query_config = {
            ...this.reportData.query_config,
            group_by: groupBy
          };
          this.updatePreview();
        }
      });

      this.components.chart = new VisualChartBuilder(document.querySelector('#chart-builder-container'), {
        onChartChange: (chartConfig) => {
          this.reportData.chart_config = chartConfig;
          this.updatePreview();
        }
      });

      this.components.parameters = new EnhancedParameterUI(document.querySelector('#parameter-ui-container'), {
        onParametersChange: (parameters) => {
          this.reportData.parameters = parameters;
          this.updatePreview();
        }
      });

      this.components.template = new ReportTemplateLibrary(document.querySelector('#template-library-container'), {
        onTemplateSelect: (template) => {
          this.applyTemplate(template);
        }
      });

      this.components.preview = new SplitPaneLivePreview(document.querySelector('#preview-content'), {
        reportConfig: this.reportData,
        autoRefresh: true
      });
    }

    setupEventListeners() {
      document.getElementById('back-to-reports')?.addEventListener('click', () => {
        window.location.hash = '#/reports-list';
      });

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const step = e.currentTarget.dataset.step;
          const stepIndex = this.steps.indexOf(step);
          if (stepIndex !== -1) this.showStep(stepIndex);
        });
      });

      // Sync Properties form fields to reportData in real time
      document.getElementById('prop-name')?.addEventListener('input', (e) => {
        this.reportData.name = e.target.value;
        document.getElementById('report-title').textContent = e.target.value || 'New Report';
      });
      document.getElementById('prop-title')?.addEventListener('input', (e) => {
        this.reportData.title = e.target.value;
      });
      document.getElementById('prop-category')?.addEventListener('input', (e) => {
        this.reportData.category = e.target.value;
      });
      document.getElementById('prop-type')?.addEventListener('change', (e) => {
        this.reportData.report_type = e.target.value;
      });
      document.getElementById('prop-description')?.addEventListener('input', (e) => {
        this.reportData.description = e.target.value;
      });
      document.getElementById('prop-public')?.addEventListener('change', (e) => {
        this.reportData.is_public = e.target.checked;
      });

      document.getElementById('save-report-btn')?.addEventListener('click', () => this.saveReport());
      document.getElementById('run-report-btn')?.addEventListener('click', () => this.runReport());
      document.getElementById('preview-report-btn')?.addEventListener('click', () => this.updatePreview());
      document.getElementById('clear-report-btn')?.addEventListener('click', () => {
        if (confirm('Clear all report configuration?')) this.clearReport();
      });
    }

    showStep(stepIndex) {
      if (stepIndex < 0 || stepIndex >= this.steps.length) return;
      this.currentStep = stepIndex;

      document.querySelectorAll('.step-content').forEach(el => el.classList.add('hidden'));
      document.getElementById(`step-${this.steps[stepIndex]}`)?.classList.remove('hidden');

      document.querySelectorAll('.tab-btn').forEach((btn, index) => {
        const active = index === stepIndex;
        btn.classList.toggle('border-blue-600', active);
        btn.classList.toggle('text-blue-600', active);
        btn.classList.toggle('border-transparent', !active);
        btn.classList.toggle('text-gray-500', !active);
      });
    }

    fillPropertiesForm() {
      const set = (id, val) => { const el = document.getElementById(id); if (el) el.value = val || ''; };
      set('prop-name', this.reportData.name);
      set('prop-title', this.reportData.title);
      set('prop-category', this.reportData.category);
      set('prop-type', this.reportData.report_type || 'tabular');
      set('prop-description', this.reportData.description);
      const pub = document.getElementById('prop-public');
      if (pub) pub.checked = !!this.reportData.is_public;
    }

    async loadReport(reportId) {
      try {
        const response = await apiFetch(`/reports/definitions/${reportId}`);
        this.reportData = await response.json();
        // Ensure query_config always exists
        this.reportData.query_config = this.reportData.query_config || {};
        this.reportData.query_config.group_by = this.reportData.query_config.group_by || [];

        document.getElementById('report-title').textContent = this.reportData.name || 'New Report';
        this.fillPropertiesForm();

        // Restore group-by state after column designer has fields
        if (this.components.columns && this.reportData.columns?.length) {
          this.components.columns.setColumns(this.reportData.columns);
          if (this.components.groupBy) {
            this.components.groupBy.setAvailableFields(this.reportData.columns);
            this.components.groupBy.setGroupBy(this.reportData.query_config.group_by);
          }
        }

        this.updatePreview();
      } catch (error) {
        console.error('Failed to load report:', error);
      }
    }

    async saveReport() {
      if (!this.reportData.name) {
        this.showStep(0);
        document.getElementById('prop-name')?.focus();
        alert('Please enter a report name first.');
        return;
      }

      try {
        const url = this.reportId ? `/reports/definitions/${this.reportId}` : '/reports/definitions';
        const method = this.reportId ? 'PUT' : 'POST';
        const response = await apiFetch(url, { method, body: JSON.stringify(this.reportData) });
        const result = await response.json();
        this.reportId = result.id;
        document.getElementById('report-title').textContent = this.reportData.name;
      } catch (error) {
        console.error('Failed to save report:', error);
      }
    }

    async runReport() {
      if (!this.reportId) {
        alert('Please save the report first');
        return;
      }
      window.location.hash = `#/report-viewer/${this.reportId}`;
    }

    updatePreview() {
      if (this.components.preview) {
        this.components.preview.updateReportConfig?.(this.reportData);
      }
    }

    applyTemplate(template) {
      this.reportData = { ...this.reportData, ...template.config };
      this.fillPropertiesForm();
      this.updatePreview();
      this.showStep(0);
    }

    clearReport() {
      this.reportData = {
        name: '', title: '', category: '', report_type: 'tabular',
        description: '', is_public: false,
        data_source: {}, columns: [],
        query_config: { group_by: [], order_by: [], filters: {}, limit: null },
        chart_config: {}, parameters: []
      };
      this.reportId = null;
      this.fillPropertiesForm();
      document.getElementById('report-title').textContent = 'New Report';

      if (this.components.dataSource) this.components.dataSource.clear?.();
      if (this.components.columns) this.components.columns.clear?.();
      if (this.components.groupBy) this.components.groupBy.setGroupBy([]);
      if (this.components.chart) this.components.chart.clear?.();
      if (this.components.parameters) this.components.parameters.clear?.();

      this.updatePreview();
      this.showStep(0);
    }
  }

  const designer = new ReportDesigner();
  window.reportDesigner = designer;
</script>
