name: App_Buildify

services:
  postgres:
    container_name: app_buildify_postgresql
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d appdb"]     
      interval: 5s
      timeout: 5s
      retries: 5

  
  # mysql:
  #   image: mysql:8.0
  #   environment:
  #     MYSQL_ROOT_PASSWORD: rootpass
  #     MYSQL_DATABASE: appdb
  #     MYSQL_USER: appuser
  #     MYSQL_PASSWORD: apppass
  #   ports:
  #     - "3306:3306"
  #   volumes:
  #     - mysql_data:/var/lib/mysql
  #   healthcheck:
  #     test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5


  redis:
    container_name: app_buildify_redis
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    container_name: app_buildify_backend
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      PYTHONPATH: /app    
      # Use PostgreSQL
      SQLALCHEMY_DATABASE_URL: postgresql+psycopg2://appuser:apppass@postgres:5432/appdb
      # Or use MySQL
      # SQLALCHEMY_DATABASE_URL: mysql+pymysql://appuser:apppass@mysql:3306/appdb
      SECRET_KEY: dev-secret-key-change-in-production
      ACCESS_TOKEN_EXPIRE_MIN: 30
      REFRESH_TOKEN_EXPIRE_DAYS: 7
      ALLOWED_ORIGINS: http://localhost:8080,http://localhost:3000
      REDIS_URL: redis://redis:6379/0
      # SMTP via MailHog (dev) — swap for real SMTP creds in staging/prod
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: noreply@app-buildify.local
      SMTP_USE_TLS: "false"
      NOTIFICATION_WORKER_INPROCESS: "true"
      PHI_ENCRYPTION_KEY: ${PHI_ENCRYPTION_KEY}
    working_dir: /app
    volumes:
      - ../backend:/app
      - ../frontend:/frontend:ro
      - ../modules/sdk:/app/modules/sdk:ro
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  financial-module:
    container_name: app_buildify_financial
    build:
      context: ../modules/financial/backend
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    environment:
      PYTHONPATH: /app
      DATABASE_STRATEGY: shared
      DATABASE_URL: postgresql://appuser:apppass@postgres:5432/appdb
      EVENT_BUS_CONNECTION_STRING: postgresql://appuser:apppass@postgres:5432/appdb
      MODULE_NAME: financial
      MODULE_VERSION: 1.0.0
      MODULE_PORT: 9001
      DEBUG: "true"
      API_PREFIX: /api/v1
      CORS_ORIGINS: '["http://localhost:8080","http://localhost:3000"]'
    working_dir: /app
    volumes:
      - ../modules/financial/backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 9001 --reload

  frontend:
    container_name: app_buildify_frontend
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
    volumes:
      - ../frontend:/usr/share/nginx/html:ro
      - ../modules:/usr/share/nginx/modules:ro
      - ../infra/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
      - ../infra/nginx/modules:/etc/nginx/conf.d/modules:ro
#      - ../infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - financial-module

  mailhog:
    container_name: app_buildify_mailhog
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI — open http://localhost:8025 to view sent mail

volumes:
  postgres_data:
  mysql_data:
