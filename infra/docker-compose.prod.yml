services:
  backend:
    image: ghcr.io/YOUR_GH_OWNER/app-backend:${TAG}
    env_file: .env
    restart: unless-stopped

  # Notification worker (per ADR-002): same image as backend, different
  # entrypoint. Reads SMTP_* / DB / NOTIFICATION_WORKER_* from .env (same
  # file as backend so config stays in one place). Scales independently
  # of the API process.
  notification-worker:
    image: ghcr.io/YOUR_GH_OWNER/app-backend:${TAG}
    command: ["python", "-m", "app.workers.notification_worker"]
    env_file: .env
    restart: unless-stopped

  frontend:
    image: ghcr.io/YOUR_GH_OWNER/app-frontend:${TAG}
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [backend, frontend]
    ports: ["80:80"]
    restart: unless-stopped

