limit_req_zone $binary_remote_addr zone=otp_limit:10m rate=5r/m;

server {
  listen 80;
  server_name _;

  # =========================
  # CLEAN MODULE URLS
  # /modules/<module>/<file>
  # =========================
  location ~ ^/modules/([^/]+)/(.+)$ {
    alias /usr/share/nginx/modules/$1/frontend/$2;

    expires 1h;
    add_header Cache-Control "public, must-revalidate";
  }



  # Docker DNS resolver (REQUIRED for dynamic upstream)
  resolver 127.0.0.11 ipv6=off;

  # =====================================
  # API: /api/<version>/<module>/...
  # =====================================
  # Standalone module services -- one conf per module in modules/
  include /etc/nginx/conf.d/modules/*.conf;

  # =========================
  # OTP rate limiting
  # =========================
  location /api/v1/otp/ {
    limit_req zone=otp_limit burst=3 nodelay;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # =========================
  # PUBLIC PORTAL  (ADR module-public-pages)
  # Serves each module's static public+patient portal app at
  # /portal/{slug}/ from its frontend/public tree. The modules tree is
  # bind-mounted at /usr/share/nginx/modules (see docker-compose.dev.yml),
  # so NO install-time file copy is needed in dev. SPA fallback to the
  # portal's own index.html keeps hash/path client routing working.
  # =========================
  # Uses root (not alias) so try_files resolves reliably: the requested file,
  # then the portal app's own index.html (SPA fallback for hash/path routing),
  # then the PLATFORM portal (for an unknown module slug — no /<slug>/frontend/
  # public/index.html exists). $1 = module slug, $2 = path within the portal.
  location ~ ^/portal/([a-z][a-z0-9-]*)/(.*)$ {
    root /usr/share/nginx/modules;
    try_files /$1/frontend/public/$2 /$1/frontend/public/index.html @platform_portal;
  }

  # Platform portal: the default landing at /portal/ and the fallback for any
  # portal URL whose module has no public portal. Lives in the frontend tree
  # (frontend/portal/index.html -> /usr/share/nginx/html/portal/index.html).
  location = /portal { return 302 /portal/; }
  location = /portal/ {
    root /usr/share/nginx/html;
    try_files /portal/index.html =404;
  }
  location @platform_portal {
    root /usr/share/nginx/html;
    try_files /portal/index.html =404;
  }

  # =========================
  # API
  # =========================
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }


  # =========================
  # STATIC ASSETS (SPA build)
  # =========================
  # Code assets are served under fixed (non-fingerprinted) names like app.js,
  # so they must NEVER be "immutable" — that prevents deploys/edits from being
  # picked up. Revalidate on every load (ETag → 304 when unchanged: cheap but
  # always fresh).
  location ~* \.(js|css|json|map|html)$ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    add_header Cache-Control "no-cache, must-revalidate";
  }

  # Media/fonts rarely change — safe to cache (but still revalidatable).
  location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|xml|txt|pdf)$ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    expires 7d;
    add_header Cache-Control "public";
  }

  # =========================
  # SPA FALLBACK (LAST)
  # =========================
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}