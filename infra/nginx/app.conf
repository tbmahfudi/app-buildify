limit_req_zone $binary_remote_addr zone=otp_limit:10m rate=5r/m;

server {
  listen 80;
  server_name _;

  # =========================
  # CLEAN MODULE URLS
  # /modules/<module>/<file>
  # =========================
  location ~ ^/modules/([^/]+)/(.+)$ {
    alias /usr/share/nginx/modules/$1/frontend/$2;

    expires 1h;
    add_header Cache-Control "public, must-revalidate";
  }



  # Docker DNS resolver (REQUIRED for dynamic upstream)
  resolver 127.0.0.11 ipv6=off;

  # =====================================
  # API: /api/<version>/<module>/...
  # =====================================
  # Standalone module services -- one conf per module in modules/
  include /etc/nginx/conf.d/modules/*.conf;

  # =========================
  # OTP rate limiting
  # =========================
  location /api/v1/otp/ {
    limit_req zone=otp_limit burst=3 nodelay;
    proxy_pass http://backend:8000;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # =========================
  # PUBLIC PORTAL
  # =========================
  location ~ ^/portal/([a-z][a-z0-9-]*)/(.*)$ {
    alias /usr/share/nginx/html/modules/$1/public/$2;
    try_files $uri $uri/ /usr/share/nginx/html/modules/$1/public/index.html =404;
  }

  # =========================
  # API
  # =========================
  location /api/ {
    proxy_pass http://backend:8000/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }


  # =========================
  # STATIC ASSETS (SPA build)
  # =========================
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|json|xml|txt|pdf|map)$ {
    root /usr/share/nginx/html;
    try_files $uri =404;
    expires 1d;
    add_header Cache-Control "public, immutable";
  }

  # =========================
  # SPA FALLBACK (LAST)
  # =========================
  location / {
    root /usr/share/nginx/html;
    try_files $uri /index.html;
  }
}