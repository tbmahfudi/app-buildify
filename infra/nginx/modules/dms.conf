# DMS standalone microservice (app_buildify_dms:9003).
#
# Routes the /api/v1/dms/... path family to the DMS backend; every other /api/
# path continues to the core backend (generic block in app.conf). Included
# before that generic block, and nginx evaluates regex locations in file order,
# so this wins for DMS paths. proxy_pass without a URI part preserves the full
# original request path, so the upstream sees the same /api/v1/dms/... its
# routers declared. The Authorization header is forwarded so the module can
# validate the platform JWT itself.
location ~ ^/api/v1/dms(/.*)?$ {
    proxy_pass http://dms-module:9003;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_set_header Authorization $http_authorization;

    # Documents can be large; relax upload limits and buffering for this family.
    client_max_body_size 128m;
    proxy_request_buffering off;
}
