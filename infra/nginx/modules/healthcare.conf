# Healthcare standalone microservice (app_buildify_healthcare:9002).
#
# Routes ONLY the path families the healthcare backend owns to :9002; every
# other /api/ path continues to the core backend (the generic /api/ block in
# app.conf). This file is include'd before that generic block, and nginx
# evaluates regex locations in file order, so these win for healthcare paths.
#
# Owned path families (all carry full /api/v1/... in the routers):
#   /api/v1/clinics/...                          (public clinic search/detail, reviews)
#   /api/v1/public/clinics/...                   (public slot availability)
#   /api/v1/patients/...                         (patient auth + /patients/me/* data)
#   /api/v1/modules/healthcare/...               (staff: branches/providers/staff/patients/audit/i18n/dpa)
#   /api/v1/modules/healthcare_scheduling/...    (staff scheduling)
#   /api/v1/modules/healthcare_billing/...        (staff billing)
#
# proxy_pass without a URI part preserves the full original request path, so
# the upstream sees the same /api/v1/... the router declared.

location ~ ^/api/v1/(clinics|public/clinics|patients)(/.*)?$ {
    proxy_pass http://healthcare-module:9002;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
}

location ~ ^/api/v1/modules/(healthcare|healthcare_scheduling|healthcare_billing)(/.*)?$ {
    proxy_pass http://healthcare-module:9002;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $http_host;
    proxy_set_header X-Forwarded-Port $server_port;
}
