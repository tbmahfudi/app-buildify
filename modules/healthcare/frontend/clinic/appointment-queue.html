<!DOCTYPE html>
<html lang="id-ID">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="queue.title">Antrian Hari Ini</title>
  <link rel="stylesheet" href="/frontend/assets/css/app.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg-main); color: var(--color-text-primary); }

    .hc-header { background: var(--color-bg-card); border-bottom: 1px solid var(--color-border); padding: var(--spacing-md) var(--spacing-xl); display: flex; align-items: center; gap: var(--spacing-md); flex-wrap: wrap; }
    .hc-header__title { font-size: var(--font-lg); font-weight: 800; flex: 1; }
    .hc-branch-badge { display: inline-flex; align-items: center; gap: var(--spacing-xs); font-size: var(--font-sm); background: rgba(37,99,235,0.1); color: var(--color-primary); border-radius: 999px; padding: var(--spacing-xs) var(--spacing-md); font-weight: 600; }
    .hc-phi-toggle { display: flex; align-items: center; gap: var(--spacing-xs); font-size: var(--font-sm); color: var(--color-text-secondary); cursor: pointer; user-select: none; }
    .hc-phi-toggle input { width: 36px; height: 20px; cursor: pointer; }

    .hc-page { max-width: 720px; margin: 0 auto; padding: var(--spacing-xl); }

    .hc-group { margin-bottom: var(--spacing-xl); }
    .hc-group__label { font-size: var(--font-sm); font-weight: 700; color: var(--color-text-secondary); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--spacing-md); }

    .hc-queue-card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-lg); margin-bottom: var(--spacing-md); display: flex; flex-direction: column; gap: var(--spacing-sm); }
    .hc-queue-card__top { display: flex; align-items: center; gap: var(--spacing-md); flex-wrap: wrap; }
    .hc-queue-card__name { font-size: var(--font-base); font-weight: 700; flex: 1; }
    .hc-queue-card__time { font-size: var(--font-sm); color: var(--color-text-secondary); }
    .hc-queue-card__actions { display: flex; gap: var(--spacing-sm); flex-wrap: wrap; }

    .hc-badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: var(--font-xs); font-weight: 700; }
    .hc-badge--confirmed { background: rgba(37,99,235,0.12); color: #1d4ed8; }
    .hc-badge--checked_in { background: rgba(13,148,136,0.12); color: #0d9488; }
    .hc-badge--in_progress { background: rgba(234,88,12,0.12); color: #ea580c; }
    .hc-badge--completed { background: rgba(22,163,74,0.12); color: #16a34a; }
    .hc-badge--no_show { background: rgba(100,116,139,0.12); color: #64748b; }

    .hc-btn { padding: var(--spacing-xs) var(--spacing-md); border: none; border-radius: var(--radius-sm); font-size: var(--font-xs); font-weight: 700; cursor: pointer; }
    .hc-btn--primary { background: var(--color-primary); color: var(--color-text-inverse); }
    .hc-btn--primary:hover { background: var(--color-primary-hover); }
    .hc-btn--teal { background: #0d9488; color: #fff; }
    .hc-btn--orange { background: #ea580c; color: #fff; }
    .hc-btn--green { background: #16a34a; color: #fff; }
    .hc-btn--grey { background: #64748b; color: #fff; }
    .hc-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Skeleton */
    .hc-skeleton { background: var(--color-border); border-radius: var(--radius-sm); animation: pulse 1.2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .hc-skeleton-card { height: 80px; border-radius: var(--radius-lg); margin-bottom: var(--spacing-md); }

    .hc-empty { text-align: center; padding: var(--spacing-2xl); color: var(--color-text-secondary); }
  </style>
</head>
<body>
  <div class="hc-header">
    <span class="hc-header__title" data-i18n="queue.title"></span>
    <div class="hc-branch-badge">
      <span data-i18n="queue.branch_context"></span>:&nbsp;<span id="branch-name">—</span>
    </div>
    <label class="hc-phi-toggle">
      <input type="checkbox" id="phi-toggle" />
      <span data-i18n="queue.phi_mask"></span>
    </label>
    <div data-locale-switcher></div>
  </div>

  <div class="hc-page">
    <div id="alert-container" style="margin-bottom:var(--spacing-md);"></div>
    <div id="queue-container"></div>
  </div>

  <script src="/frontend/assets/js/flex-components.js"></script>
  <script type="module" src="./appointment-queue.js"></script>
</body>
</html>
