<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Detail Invoice</title>
  <link rel="stylesheet" href="/platform/css/design-system.css"/>
  <link rel="stylesheet" href="/platform/css/components.css"/>
  <link rel="stylesheet" href="/modules/healthcare/frontend/healthcare.css"/>
  
  <style>
    .status-badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.8rem;font-weight:600}
    .badge-draft{background:var(--color-neutral-200);color:var(--color-neutral-700)}
    .badge-finalized{background:var(--color-success-100);color:var(--color-success-700)}
    .badge-void{background:var(--color-danger-100);color:var(--color-danger-700)}
    .flex-alert{display:flex;align-items:flex-start;gap:.75rem;padding:.875rem 1rem;border-radius:8px;margin-bottom:1.25rem}
    .flex-alert-warning{background:var(--color-warning-50);border:1px solid var(--color-warning-300);color:var(--color-warning-900)}
    .phi-mask{color:var(--color-neutral-400);letter-spacing:.1em}
    .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center}
    .modal-overlay.open{display:flex}
    .modal-box{background:var(--color-surface);border-radius:12px;padding:1.5rem;min-width:340px;max-width:520px;width:100%;box-shadow:var(--shadow-lg)}
    .datagrid{width:100%;border-collapse:collapse}
    .datagrid th,.datagrid td{padding:.6rem .75rem;border-bottom:1px solid var(--color-border);text-align:left;font-size:.9rem}
    .datagrid th{background:var(--color-neutral-50);font-weight:600;color:var(--color-neutral-600)}
    .datagrid tr:hover td{background:var(--color-neutral-50)}
    .page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem}
    .filter-bar{display:flex;flex-wrap:wrap;gap:.75rem;margin-bottom:1rem}
    .filter-bar select,.filter-bar input{padding:.45rem .7rem;border:1px solid var(--color-border);border-radius:6px;font-size:.9rem;background:var(--color-surface)}
    .btn{display:inline-flex;align-items:center;gap:.4rem;padding:.5rem 1rem;border-radius:6px;border:none;cursor:pointer;font-size:.9rem;font-weight:500}
    .btn-primary{background:var(--color-primary);color:#fff}
    .btn-secondary{background:var(--color-neutral-100);color:var(--color-neutral-800);border:1px solid var(--color-border)}
    .btn-danger{background:var(--color-danger);color:#fff}
    .btn-sm{padding:.3rem .65rem;font-size:.8rem}
    .line-items-table{width:100%;border-collapse:collapse;margin:.75rem 0}
    .line-items-table th,.line-items-table td{padding:.5rem .6rem;border:1px solid var(--color-border);font-size:.875rem}
    .line-items-table th{background:var(--color-neutral-50)}
    .total-row{font-weight:700;font-size:1.05rem;text-align:right;padding:.75rem 0}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:10px;padding:1.25rem;margin-bottom:1rem}
    .invoice-card{cursor:pointer;transition:box-shadow .15s}
    .invoice-card:hover{box-shadow:var(--shadow-md)}
    .spinner{display:none;width:24px;height:24px;border:3px solid var(--color-neutral-200);border-top-color:var(--color-primary);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .empty-state{text-align:center;padding:3rem 1rem;color:var(--color-neutral-500)}
  </style>
</head>
<body>
<div class="app-container" style="max-width:820px;margin:0 auto;padding:1.5rem">
  <div class="page-header">
    <div>
      <h1 style="font-size:1.4rem;font-weight:700" id="inv-number">—</h1>
      <div id="inv-status" style="margin-top:.3rem"></div>
    </div>
    <div style="display:flex;gap:.75rem;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="history.back()">← Kembali</button>
      <button class="btn btn-secondary" id="btn-print">Cetak / Download</button>
      <button class="btn btn-primary" id="btn-finalize" style="display:none"></button>
      <button class="btn btn-danger" id="btn-void" style="display:none"></button>
    </div>
  </div>

  <!-- Invoice meta -->
  <div class="card" id="inv-meta" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:.75rem">
    <div><div style="font-size:.75rem;color:var(--color-neutral-500)">Tanggal Dibuat</div><div id="inv-created">—</div></div>
    <div><div style="font-size:.75rem;color:var(--color-neutral-500)">Tanggal Finalisasi</div><div id="inv-finalized">—</div></div>
    <div><div style="font-size:.75rem;color:var(--color-neutral-500)">Tanggal Batal</div><div id="inv-voided">—</div></div>
  </div>

  <!-- Patient (PHI) -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem">
      <span style="font-weight:600">Pasien</span>
      <button class="btn btn-secondary btn-sm" id="phi-toggle">🔒 Tampilkan</button>
    </div>
    <div id="patient-info" class="phi-mask">••••••••</div>
  </div>

  <!-- Line items -->
  <div class="card">
    <h3 style="margin-bottom:.75rem">Item Layanan</h3>
    <table class="line-items-table" id="line-items-table">
      <thead><tr><th>Layanan</th><th>Qty</th><th>Harga Satuan</th><th>Subtotal</th></tr></thead>
      <tbody id="line-items-body"></tbody>
      <tfoot><tr><td colspan="3" style="text-align:right;font-weight:700;padding:.5rem .6rem">Total</td><td style="font-weight:700;padding:.5rem .6rem" id="inv-total">—</td></tr></tfoot>
    </table>
  </div>

  <!-- Payments -->
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem">
      <h3>Riwayat Pembayaran</h3>
      <button class="btn btn-primary btn-sm" id="btn-record-payment" style="display:none"></button>
    </div>
    <div id="payment-list"><div style="color:var(--color-neutral-400);font-size:.875rem">Belum ada pembayaran.</div></div>
  </div>
</div>

<!-- Confirm modal -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal-box">
    <p id="confirm-msg" style="margin-bottom:1.25rem"></p>
    <div style="display:flex;gap:.75rem;justify-content:flex-end">
      <button class="btn btn-secondary" id="confirm-cancel">Batal</button>
      <button class="btn btn-danger" id="confirm-ok">OK</button>
    </div>
  </div>
</div>

<!-- Payment modal -->
<div class="modal-overlay" id="payment-modal">
  <div class="modal-box">
    <h3 style="margin-bottom:1rem" id="lbl-record-payment"></h3>
    <div style="display:grid;gap:.75rem">
      <div>
        <label style="font-size:.875rem;font-weight:600;display:block;margin-bottom:.3rem">Jumlah (Rp)</label>
        <input type="number" min="0" id="pay-amount" placeholder="0"
               style="width:100%;padding:.45rem .7rem;border:1px solid var(--color-border);border-radius:6px;font-size:.9rem"/>
      </div>
      <div>
        <label style="font-size:.875rem;font-weight:600;display:block;margin-bottom:.3rem" id="lbl-pay-method"></label>
        <select id="pay-method" style="width:100%;padding:.45rem .7rem;border:1px solid var(--color-border);border-radius:6px;font-size:.9rem">
          <option value="tunai">Tunai</option>
          <option value="transfer">Transfer</option>
          <option value="bpjs">BPJS</option>
          <option value="asuransi">Asuransi</option>
          <option value="lainnya">Lainnya</option>
        </select>
      </div>
      <div>
        <label style="font-size:.875rem;font-weight:600;display:block;margin-bottom:.3rem">Tanggal Pembayaran</label>
        <input type="date" id="pay-date" style="width:100%;padding:.45rem .7rem;border:1px solid var(--color-border);border-radius:6px;font-size:.9rem"/>
      </div>
      <div>
        <label style="font-size:.875rem;font-weight:600;display:block;margin-bottom:.3rem">No. Referensi</label>
        <input type="text" id="pay-ref" placeholder="Opsional"
               style="width:100%;padding:.45rem .7rem;border:1px solid var(--color-border);border-radius:6px;font-size:.9rem"/>
      </div>
    </div>
    <div style="display:flex;gap:.75rem;margin-top:1rem;justify-content:flex-end">
      <button class="btn btn-secondary" id="pay-cancel">Batal</button>
      <button class="btn btn-primary" id="pay-submit">Simpan</button>
    </div>
  </div>
</div>
<script src="/platform/js/api.js"></script>
<script src="/modules/healthcare/frontend/i18n.js"></script>
<script src="/modules/healthcare/frontend/locale-switcher.js"></script>
<script src="invoice-detail.js"></script>
</body>
</html>
