<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detail Order Lab</title>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <style>
    .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:700}
    .priority-stat{background:var(--color-danger);color:#fff}
    .priority-urgent{background:var(--color-warning);color:#fff}
    .priority-routine{background:var(--color-surface-2);color:var(--color-text-muted)}
    .timeline{display:flex;gap:0;margin:24px 0;align-items:center}
    .tl-step{display:flex;flex-direction:column;align-items:center;flex:1;position:relative}
    .tl-step::before{content:'';position:absolute;top:16px;left:-50%;width:100%;height:3px;background:var(--color-border);z-index:0}
    .tl-step:first-child::before{display:none}
    .tl-dot{width:32px;height:32px;border-radius:50%;background:var(--color-border);z-index:1;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--color-text-muted)}
    .tl-dot.active{background:var(--color-primary);color:#fff}
    .tl-dot.done{background:var(--color-success);color:#fff}
    .tl-label{font-size:.72rem;text-align:center;margin-top:6px;color:var(--color-text-muted)}
    .tl-label.active{color:var(--color-primary);font-weight:700}
    .section{background:var(--color-surface);border:1px solid var(--color-border);border-radius:10px;padding:20px;margin-bottom:20px}
    .section h2{font-size:1rem;font-weight:700;margin-bottom:14px}
    .form-group{margin-bottom:14px}
    .form-group label{display:block;font-size:.85rem;font-weight:600;margin-bottom:4px}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid var(--color-border);border-radius:6px;font-size:.95rem;background:var(--color-surface);color:var(--color-text)}
    .btn{padding:8px 18px;border:none;border-radius:6px;cursor:pointer;font-size:.9rem;font-weight:600}
    .btn-primary{background:var(--color-primary);color:#fff}
    .btn-danger{background:var(--color-danger);color:#fff}
    .btn-secondary{background:var(--color-surface-2);color:var(--color-text)}
    .critical-banner{background:var(--color-danger-light,#fee2e2);border:1px solid var(--color-danger);border-radius:8px;padding:12px 16px;color:var(--color-danger);font-weight:700;margin-bottom:16px}
    .result-row{border:1px solid var(--color-border);border-radius:8px;padding:14px;margin-bottom:12px;background:var(--color-surface)}
    .result-row h3{font-size:.95rem;font-weight:700;margin-bottom:10px}
    .inline-fields{display:flex;gap:12px;flex-wrap:wrap}
    .inline-fields .form-group{flex:1;min-width:140px}
    .hidden{display:none!important}
    .meta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;margin-bottom:12px}
    .meta-item{font-size:.9rem}<br/>
    .meta-item span:first-child{color:var(--color-text-muted);display:block;font-size:.78rem}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100}
    .modal-box{background:var(--color-surface);border-radius:12px;padding:28px;width:440px;max-width:95vw}
  </style>
</head>
<body>
<div class="container" style="max-width:860px;margin:0 auto;padding:24px">
  <div style="margin-bottom:16px">
    <a href="javascript:history.back()" style="color:var(--color-primary);font-size:.9rem">← Kembali</a>
  </div>

  <!-- Order header -->
  <div class="section" id="order-header">
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
      <span id="hdr-priority" class="badge"></span>
      <span id="hdr-status" style="font-size:.9rem;color:var(--color-text-muted)"></span>
    </div>
    <div class="meta-grid">
      <div class="meta-item"><span>Tanggal Kunjungan</span><strong id="hdr-date">-</strong></div>
      <div class="meta-item"><span>Dokter Pemesan</span><strong id="hdr-provider">-</strong></div>
      <div class="meta-item"><span>Pasien</span><strong id="hdr-patient">-</strong></div>
    </div>
    <div id="hdr-notes" style="font-size:.88rem;color:var(--color-text-muted);margin-top:8px"></div>
  </div>

  <!-- Status timeline -->
  <div class="timeline" id="timeline">
    <div class="tl-step" id="tl-ordered">
      <div class="tl-dot">1</div>
      <div class="tl-label">Ordered</div>
    </div>
    <div class="tl-step" id="tl-collected">
      <div class="tl-dot">2</div>
      <div class="tl-label">Spesimen</div>
    </div>
    <div class="tl-step" id="tl-processing">
      <div class="tl-dot">3</div>
      <div class="tl-label">Diproses</div>
    </div>
    <div class="tl-step" id="tl-resulted">
      <div class="tl-dot">4</div>
      <div class="tl-label">Selesai</div>
    </div>
  </div>

  <!-- Specimen section -->
  <div class="section hidden" id="specimen-section">
    <h2>Kumpulkan Spesimen</h2>
    <form id="specimen-form">
      <div class="form-group">
        <label>Jenis Sampel</label>
        <input type="text" id="sp-sample-type" readonly/>
      </div>
      <div class="form-group">
        <label>Waktu Pengambilan</label>
        <input type="datetime-local" id="sp-collected-at"/>
      </div>
      <div class="form-group">
        <label>Barcode</label>
        <div style="display:flex;gap:8px">
          <input type="text" id="sp-barcode" style="flex:1"/>
          <button type="button" class="btn btn-secondary" id="btn-auto-barcode">Auto-generate</button>
        </div>
      </div>
      <div class="form-group">
        <label>Catatan</label>
        <textarea id="sp-notes" rows="2"></textarea>
      </div>
      <button type="submit" class="btn btn-primary">Konfirmasi Pengambilan Spesimen</button>
    </form>
  </div>

  <!-- Results section -->
  <div class="section hidden" id="results-section">
    <h2>Input Hasil Pemeriksaan</h2>
    <div id="critical-banner" class="critical-banner hidden">
      Hasil kritis akan mengirim notifikasi segera ke dokter pemesan
    </div>
    <div id="result-lines"></div>
    <button class="btn btn-primary" id="btn-submit-results" style="margin-top:8px">Simpan Hasil</button>
  </div>

  <!-- Release section -->
  <div class="section hidden" id="release-section">
    <h2>Tindakan</h2>
    <button class="btn btn-primary" id="btn-release">Rilis ke Pasien</button>
  </div>

  <!-- Cancel section -->
  <div id="cancel-section" class="hidden" style="margin-top:8px">
    <button class="btn btn-danger" id="btn-cancel-order">Batalkan Order</button>
  </div>
</div>

<!-- Release confirm modal -->
<div class="modal-overlay hidden" id="release-modal">
  <div class="modal-box">
    <p style="margin-bottom:20px;font-size:.95rem">Hasil akan terlihat oleh pasien setelah dirilis. Lanjutkan?</p>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" id="btn-release-cancel">Batal</button>
      <button class="btn btn-primary" id="btn-release-confirm">Ya, Rilis</button>
    </div>
  </div>
</div>

<script src="/static/js/i18n.js"></script>
<script src="lab-order-detail.js"></script>
</body>
</html>
