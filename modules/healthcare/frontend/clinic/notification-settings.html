<!DOCTYPE html>
<html lang="id-ID">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="notification.settings_title">Pengaturan Notifikasi</title>
  <link rel="stylesheet" href="/frontend/assets/css/app.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg-main); color: var(--color-text-primary); }

    .hc-page { max-width: 720px; margin: 0 auto; padding: var(--spacing-xl); }
    .hc-page__header { display: flex; align-items: center; gap: var(--spacing-md); margin-bottom: var(--spacing-lg); }
    .hc-page__title { font-size: var(--font-xl); font-weight: 800; flex: 1; }

    .hc-notice { background: rgba(37,99,235,0.07); border: 1px solid var(--color-primary); border-radius: var(--radius-md); padding: var(--spacing-md) var(--spacing-lg); font-size: var(--font-sm); color: var(--color-primary); margin-bottom: var(--spacing-xl); }

    .hc-template-card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-lg); margin-bottom: var(--spacing-md); }
    .hc-template-card__header { display: flex; align-items: center; gap: var(--spacing-sm); flex-wrap: wrap; margin-bottom: var(--spacing-md); }
    .hc-template-card__name { font-weight: 700; font-size: var(--font-base); flex: 1; font-family: monospace; }
    .hc-template-card__channel { font-size: var(--font-xs); background: var(--color-bg-main); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: 2px 8px; color: var(--color-text-secondary); }

    .hc-locked-badge { display: inline-flex; align-items: center; gap: 4px; font-size: var(--font-xs); font-weight: 700; background: rgba(100,116,139,0.1); color: #64748b; border-radius: 999px; padding: 2px 10px; position: relative; cursor: default; }
    .hc-locked-badge:hover .hc-tooltip { display: block; }
    .hc-tooltip { display: none; position: absolute; bottom: 110%; right: 0; background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: var(--spacing-xs) var(--spacing-sm); font-size: var(--font-xs); white-space: nowrap; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.12); font-weight: 400; color: var(--color-text-primary); }

    .hc-locale-toggle { display: flex; gap: var(--spacing-xs); margin-bottom: var(--spacing-sm); }
    .hc-locale-btn { padding: var(--spacing-xs) var(--spacing-sm); border: 1.5px solid var(--color-border); border-radius: var(--radius-sm); background: transparent; color: var(--color-text-secondary); cursor: pointer; font-size: var(--font-xs); font-weight: 600; }
    .hc-locale-btn.active { border-color: var(--color-primary); color: var(--color-primary); background: rgba(37,99,235,0.06); }

    .hc-template-preview { background: var(--color-bg-main); border: 1px solid var(--color-border); border-radius: var(--radius-sm); padding: var(--spacing-md); font-size: var(--font-sm); color: var(--color-text-secondary); line-height: 1.6; white-space: pre-wrap; word-break: break-word; min-height: 60px; }

    .hc-template-card__footer { display: flex; justify-content: flex-end; margin-top: var(--spacing-md); }
    .hc-btn { padding: var(--spacing-xs) var(--spacing-md); border: none; border-radius: var(--radius-sm); font-size: var(--font-sm); font-weight: 700; cursor: pointer; }
    .hc-btn--outline { background: transparent; border: 1.5px solid var(--color-primary); color: var(--color-primary); }
    .hc-btn--outline:hover { background: var(--color-primary); color: var(--color-text-inverse); }

    /* Modal */
    .hc-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .hc-modal.open { display: flex; }
    .hc-modal__box { background: var(--color-bg-card); border-radius: var(--radius-lg); padding: var(--spacing-xl); width: 100%; max-width: 400px; margin: var(--spacing-md); }
    .hc-modal__title { font-weight: 700; margin-bottom: var(--spacing-md); }
    .hc-field { margin-bottom: var(--spacing-md); }
    .hc-field label { display: block; font-size: var(--font-sm); font-weight: 600; color: var(--color-text-secondary); margin-bottom: var(--spacing-xs); }
    .hc-field input { width: 100%; padding: var(--spacing-sm); border: 1.5px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-bg-main); color: var(--color-text-primary); font-size: var(--font-sm); }
    .hc-field__hint { font-size: var(--font-xs); color: var(--color-text-tertiary); margin-top: var(--spacing-xs); }
    .hc-modal__actions { display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-lg); }
    .hc-btn--ghost { background: transparent; border: 1.5px solid var(--color-border); color: var(--color-text-secondary); flex: 1; }
    .hc-btn--primary { background: var(--color-primary); color: var(--color-text-inverse); flex: 1; }
  </style>
</head>
<body>
  <div class="hc-page">
    <div class="hc-page__header">
      <h1 class="hc-page__title" data-i18n="notification.settings_title"></h1>
      <div data-locale-switcher></div>
    </div>

    <div class="hc-notice" data-i18n="notification.locked_banner"></div>

    <div id="alert-container" style="margin-bottom:var(--spacing-md);"></div>

    <div id="templates-container"></div>
  </div>

  <!-- Send Test modal -->
  <div class="hc-modal" id="test-modal" role="dialog" aria-modal="true">
    <div class="hc-modal__box">
      <div class="hc-modal__title" data-i18n="notification.send_test"></div>
      <div class="hc-field">
        <label>Nomor Telepon</label>
        <input type="tel" id="test-phone" inputmode="tel" placeholder="+628..." />
        <span class="hc-field__hint" data-i18n="notification.test_phone_note"></span>
      </div>
      <div id="test-result" style="font-size:var(--font-sm);color:var(--color-text-secondary);min-height:24px;"></div>
      <div class="hc-modal__actions">
        <button class="hc-btn hc-btn--ghost" id="btn-close-test" data-i18n="common.close"></button>
        <button class="hc-btn hc-btn--primary" id="btn-submit-test" data-i18n="notification.send_test"></button>
      </div>
    </div>
  </div>

  <script src="/frontend/assets/js/flex-components.js"></script>
  <script type="module" src="./notification-settings.js"></script>
</body>
</html>
