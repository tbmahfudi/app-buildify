<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detail Hasil Lab</title>
  <link rel="stylesheet" href="/static/css/main.css"/>
  <style>
    .badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:.75rem;font-weight:700}
    .badge-critical{background:var(--color-danger);color:#fff}
    .badge-abnormal{background:var(--color-warning-light);color:var(--color-warning)}
    table{width:100%;border-collapse:collapse;margin-bottom:20px}
    th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--color-border);font-size:.9rem}
    th{background:var(--color-surface-2);font-weight:600;font-size:.82rem}
    .critical-notice{background:var(--color-danger-light,#fee2e2);border:1px solid var(--color-danger);border-radius:8px;padding:10px 14px;color:var(--color-danger);font-weight:700;margin:10px 0}
    .section{margin-bottom:24px}
    .disclaimer{font-size:.82rem;color:var(--color-text-muted);border-top:1px solid var(--color-border);padding-top:14px;margin-top:20px}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--color-surface);border-top:1px solid var(--color-border);display:flex;justify-content:space-around;padding:10px 0}
    .bottom-nav a{display:flex;flex-direction:column;align-items:center;font-size:.72rem;color:var(--color-text-muted);text-decoration:none}
    .bottom-nav a.active{color:var(--color-primary)}
  </style>
</head>
<body>
<div class="container" style="max-width:600px;margin:0 auto;padding:20px;padding-bottom:80px">
  <div style="margin-bottom:16px">
    <a href="/patient/lab-results" style="color:var(--color-primary);font-size:.9rem">← Kembali</a>
  </div>
  <h1 style="font-size:1.2rem;font-weight:700;margin-bottom:8px">Detail Hasil Lab</h1>
  <div id="order-info" style="font-size:.88rem;color:var(--color-text-muted);margin-bottom:20px"></div>
  <div id="results-wrap"></div>
  <div class="disclaimer">
    Hasil ini hanya untuk referensi. Konsultasikan dengan dokter Anda untuk interpretasi lebih lanjut.
  </div>
</div>
<nav class="bottom-nav">
  <a href="/patient/portal"><span>🏠</span><span>Beranda</span></a>
  <a href="/patient/appointments"><span>📅</span><span>Janji</span></a>
  <a href="/patient/lab-results" class="active"><span>🧪</span><span>Lab</span></a>
  <a href="/patient/profile"><span>👤</span><span>Profil</span></a>
</nav>
<script src="/static/js/i18n.js"></script>
<script src="lab-result-detail.js"></script>
</body>
</html>
