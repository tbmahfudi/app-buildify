<!DOCTYPE html>
<html lang="id-ID">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="waitlist.title">Daftar Tunggu</title>
  <link rel="stylesheet" href="/frontend/assets/css/app.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg-main); color: var(--color-text-primary); }

    .hc-page { max-width: 600px; margin: 0 auto; padding: var(--spacing-xl); }
    .hc-page__header { display: flex; align-items: center; margin-bottom: var(--spacing-xl); gap: var(--spacing-md); }
    .hc-page__title { font-size: var(--font-xl); font-weight: 800; flex: 1; }

    /* Offer card */
    .hc-offer-card { background: var(--color-bg-card); border: 2px solid var(--color-warning); border-radius: var(--radius-lg); padding: var(--spacing-xl); margin-bottom: var(--spacing-xl); }
    .hc-offer-card__label { font-size: var(--font-xs); font-weight: 700; color: var(--color-warning); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: var(--spacing-sm); }
    .hc-offer-card__clinic { font-size: var(--font-lg); font-weight: 800; margin-bottom: var(--spacing-xs); }
    .hc-offer-card__details { font-size: var(--font-sm); color: var(--color-text-secondary); margin-bottom: var(--spacing-md); }
    .hc-countdown { margin-bottom: var(--spacing-md); }
    .hc-countdown__label { font-size: var(--font-sm); color: var(--color-text-secondary); margin-bottom: var(--spacing-xs); }
    .hc-countdown__bar-wrap { background: var(--color-border); border-radius: 999px; height: 8px; overflow: hidden; margin-bottom: var(--spacing-xs); }
    .hc-countdown__bar { height: 100%; background: var(--color-warning); border-radius: 999px; transition: width 1s linear; }
    .hc-countdown__time { font-size: var(--font-sm); font-weight: 700; color: var(--color-warning); }
    .hc-offer-card__actions { display: flex; gap: var(--spacing-sm); }

    /* Waitlist cards */
    .hc-wl-card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-lg); margin-bottom: var(--spacing-md); display: flex; align-items: center; gap: var(--spacing-md); flex-wrap: wrap; }
    .hc-wl-card__info { flex: 1; }
    .hc-wl-card__clinic { font-weight: 700; font-size: var(--font-base); }
    .hc-wl-card__type { font-size: var(--font-sm); color: var(--color-text-secondary); }

    .hc-badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: var(--font-xs); font-weight: 700; }
    .hc-badge--waiting  { background: rgba(37,99,235,0.12); color: #1d4ed8; }
    .hc-badge--offered  { background: rgba(234,88,12,0.12); color: #ea580c; }
    .hc-badge--expired  { background: rgba(100,116,139,0.12); color: #64748b; }
    .hc-badge--removed  { background: rgba(100,116,139,0.12); color: #64748b; }
    .hc-badge--accepted { background: rgba(22,163,74,0.12); color: #16a34a; }

    .hc-btn { padding: var(--spacing-xs) var(--spacing-md); border: none; border-radius: var(--radius-sm); font-size: var(--font-sm); font-weight: 700; cursor: pointer; }
    .hc-btn--primary { background: var(--color-primary); color: var(--color-text-inverse); }
    .hc-btn--primary:hover { background: var(--color-primary-hover); }
    .hc-btn--danger { background: transparent; border: 1.5px solid var(--color-danger, #dc2626); color: var(--color-danger, #dc2626); }
    .hc-btn--ghost { background: transparent; border: 1.5px solid var(--color-border); color: var(--color-text-secondary); }
    .hc-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .hc-btn--accept { background: var(--color-success); color: #fff; flex: 1; padding: var(--spacing-sm); }
    .hc-btn--decline { background: transparent; border: 1.5px solid var(--color-border); color: var(--color-text-secondary); flex: 1; padding: var(--spacing-sm); }

    .hc-empty { text-align: center; padding: var(--spacing-2xl); color: var(--color-text-secondary); }
    .hc-empty a { color: var(--color-primary); }

    /* Modal */
    .hc-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .hc-modal.open { display: flex; }
    .hc-modal__box { background: var(--color-bg-card); border-radius: var(--radius-lg); padding: var(--spacing-xl); width: 100%; max-width: 400px; margin: var(--spacing-md); }
    .hc-modal__title { font-weight: 700; margin-bottom: var(--spacing-md); }
    .hc-modal__actions { display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-lg); }
  </style>
</head>
<body>
  <div class="hc-page">
    <div class="hc-page__header">
      <h1 class="hc-page__title" data-i18n="waitlist.title"></h1>
      <div data-locale-switcher></div>
    </div>

    <div id="alert-container" style="margin-bottom:var(--spacing-md);"></div>

    <!-- Offer card (shown when status=offered) -->
    <div id="offer-section" style="display:none;">
      <div class="hc-offer-card" id="offer-card">
        <div class="hc-offer-card__label" data-i18n="waitlist.status_offered"></div>
        <div class="hc-offer-card__clinic" id="offer-clinic"></div>
        <div class="hc-offer-card__details" id="offer-details"></div>
        <div class="hc-countdown">
          <div class="hc-countdown__label" data-i18n="waitlist.offer_expires"></div>
          <div class="hc-countdown__bar-wrap"><div class="hc-countdown__bar" id="countdown-bar" style="width:100%;"></div></div>
          <div class="hc-countdown__time" id="countdown-time">15:00</div>
        </div>
        <div class="hc-offer-card__actions">
          <button class="hc-btn hc-btn--accept" id="btn-accept-offer" data-i18n="waitlist.accept"></button>
          <button class="hc-btn hc-btn--decline" id="btn-decline-offer" data-i18n="waitlist.decline"></button>
        </div>
      </div>
    </div>

    <!-- Waitlist entries -->
    <div id="waitlist-container"></div>
  </div>

  <!-- Leave waitlist confirm modal -->
  <div class="hc-modal" id="leave-modal" role="dialog" aria-modal="true">
    <div class="hc-modal__box">
      <div class="hc-modal__title" data-i18n="waitlist.leave"></div>
      <p style="font-size:var(--font-sm);color:var(--color-text-secondary);" data-i18n="waitlist.leave_confirm"></p>
      <div class="hc-modal__actions">
        <button class="hc-btn hc-btn--ghost" id="btn-cancel-leave" data-i18n="common.cancel"></button>
        <button class="hc-btn hc-btn--danger" id="btn-confirm-leave" data-i18n="waitlist.leave"></button>
      </div>
    </div>
  </div>

  <script src="/frontend/assets/js/flex-components.js"></script>
  <script type="module" src="./waitlist.js"></script>
</body>
</html>
