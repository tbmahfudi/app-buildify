<!DOCTYPE html>
<html lang="id-ID">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="clinicProfile.pageTitle">Profil Klinik</title>
  <link rel="stylesheet" href="/frontend/assets/css/app.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, sans-serif;
      background: var(--color-bg-main);
      color: var(--color-text-primary);
      min-height: 100vh;
    }

    header.hc-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
      padding: var(--spacing-md) var(--spacing-xl);
      background: var(--color-bg-header);
      border-bottom: 1px solid var(--color-border);
    }

    .hc-header__logo { font-weight: 700; font-size: var(--font-lg); color: var(--color-primary); }

    .hc-header__nav { display: flex; gap: var(--spacing-md); align-items: center; }

    .hc-header__nav a {
      color: var(--color-text-secondary);
      text-decoration: none;
      font-size: var(--font-sm);
      font-weight: 600;
    }

    /* ── hero ────────────────────────────────────────────────────── */
    .hc-hero {
      background: var(--color-bg-card);
      border-bottom: 1px solid var(--color-border);
      padding: var(--spacing-2xl) var(--spacing-xl);
    }

    .hc-hero__inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: flex-start;
      justify-content: space-between;
      gap: var(--spacing-lg);
    }

    .hc-hero__name { font-size: var(--font-xl); font-weight: 800; }

    .hc-hero__tags { display: flex; flex-wrap: wrap; gap: var(--spacing-xs); margin-top: var(--spacing-sm); }

    .hc-tag {
      background: var(--color-primary);
      color: var(--color-text-inverse);
      font-size: var(--font-xs);
      padding: 2px var(--spacing-sm);
      border-radius: var(--radius-sm);
    }

    .hc-hero__meta { color: var(--color-text-secondary); font-size: var(--font-sm); margin-top: var(--spacing-sm); }

    .hc-hero__rating { color: #f59e0b; margin-top: var(--spacing-xs); font-size: var(--font-sm); }

    .hc-hero__cta {
      padding: var(--spacing-sm) var(--spacing-2xl);
      background: var(--color-primary);
      color: var(--color-text-inverse);
      border: none;
      border-radius: var(--radius-md);
      font-size: var(--font-base);
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-block;
      margin-top: var(--spacing-md);
    }

    .hc-hero__cta:hover { background: var(--color-primary-hover); }

    /* ── tabs ────────────────────────────────────────────────────── */
    .hc-tabs {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 var(--spacing-xl);
    }

    .hc-tab-nav {
      display: flex;
      border-bottom: 2px solid var(--color-border);
      margin-top: var(--spacing-xl);
      gap: 0;
    }

    .hc-tab-nav__btn {
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      padding: var(--spacing-sm) var(--spacing-lg);
      font-size: var(--font-sm);
      font-weight: 600;
      color: var(--color-text-secondary);
      cursor: pointer;
      margin-bottom: -2px;
    }

    .hc-tab-nav__btn.active {
      color: var(--color-primary);
      border-bottom-color: var(--color-primary);
    }

    .hc-tab-panel { display: none; padding: var(--spacing-xl) 0; }
    .hc-tab-panel.active { display: block; }

    /* ── content cards ───────────────────────────────────────────── */
    .hc-info-section { margin-bottom: var(--spacing-lg); }
    .hc-info-section h3 { font-size: var(--font-base); font-weight: 700; margin-bottom: var(--spacing-sm); }
    .hc-info-section p  { font-size: var(--font-sm); color: var(--color-text-secondary); line-height: 1.6; }

    .hc-branch-grid, .hc-doctor-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--spacing-md);
    }

    @media (min-width: 768px) {
      .hc-branch-grid, .hc-doctor-grid { grid-template-columns: 1fr 1fr; }
    }

    .hc-branch-card, .hc-doctor-card {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--spacing-md);
    }

    .hc-branch-card__name, .hc-doctor-card__name {
      font-weight: 700;
      margin-bottom: var(--spacing-xs);
    }

    .hc-branch-card__meta, .hc-doctor-card__specialty {
      font-size: var(--font-sm);
      color: var(--color-text-secondary);
    }

    .hc-online-badge {
      display: inline-block;
      background: #16a34a;
      color: #fff;
      font-size: var(--font-xs);
      padding: 1px var(--spacing-sm);
      border-radius: var(--radius-sm);
      margin-top: var(--spacing-xs);
    }

    /* ── reviews ─────────────────────────────────────────────────── */
    .hc-star-dist { margin-bottom: var(--spacing-lg); }

    .hc-star-row {
      display: flex;
      align-items: center;
      gap: var(--spacing-sm);
      margin-bottom: var(--spacing-xs);
      font-size: var(--font-sm);
    }

    .hc-star-bar-bg {
      flex: 1;
      height: 8px;
      background: var(--color-border);
      border-radius: var(--radius-sm);
      overflow: hidden;
    }

    .hc-star-bar-fill {
      height: 100%;
      background: #f59e0b;
    }

    .hc-review-list { display: flex; flex-direction: column; gap: var(--spacing-md); }

    .hc-review {
      background: var(--color-bg-card);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-md);
      padding: var(--spacing-md);
    }

    .hc-review__header { display: flex; justify-content: space-between; margin-bottom: var(--spacing-xs); }
    .hc-review__author { font-weight: 600; font-size: var(--font-sm); }
    .hc-review__stars  { color: #f59e0b; font-size: var(--font-sm); }
    .hc-review__body   { font-size: var(--font-sm); color: var(--color-text-secondary); }

    /* ── skeleton ────────────────────────────────────────────────── */
    .hc-skeleton {
      background: linear-gradient(90deg, var(--color-border) 25%, var(--color-border-light) 50%, var(--color-border) 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s infinite;
      border-radius: var(--radius-md);
    }

    @keyframes skeleton-shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>
  <header class="hc-header">
    <span class="hc-header__logo"><a href="/clinics" style="color:inherit;text-decoration:none">App-Buildify Healthcare</a></span>
    <div class="hc-header__nav">
      <div data-locale-switcher></div>
      <a href="/patient/register" data-i18n="nav.register"></a>
      <a href="/login" data-i18n="nav.login"></a>
    </div>
  </header>

  <!-- Hero (populated by JS) -->
  <div class="hc-hero">
    <div class="hc-hero__inner" id="hero-content">
      <div>
        <div class="hc-skeleton" style="width:240px;height:28px;margin-bottom:var(--spacing-sm)"></div>
        <div class="hc-skeleton" style="width:160px;height:18px"></div>
      </div>
    </div>
  </div>

  <!-- Tabs -->
  <div class="hc-tabs">
    <nav class="hc-tab-nav" role="tablist">
      <button class="hc-tab-nav__btn active" role="tab" data-tab="info"     data-i18n="clinicProfile.tab.info"></button>
      <button class="hc-tab-nav__btn"         role="tab" data-tab="branches" data-i18n="clinicProfile.tab.branches"></button>
      <button class="hc-tab-nav__btn"         role="tab" data-tab="doctors"  data-i18n="clinicProfile.tab.doctors"></button>
      <button class="hc-tab-nav__btn"         role="tab" data-tab="reviews"  data-i18n="clinicProfile.tab.reviews"></button>
    </nav>

    <div class="hc-tab-panel active" id="tab-info"></div>
    <div class="hc-tab-panel"        id="tab-branches"></div>
    <div class="hc-tab-panel"        id="tab-doctors"></div>
    <div class="hc-tab-panel"        id="tab-reviews"></div>
  </div>

  <script type="module" src="./clinic-profile.js"></script>
</body>
</html>
