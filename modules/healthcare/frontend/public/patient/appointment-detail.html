<!DOCTYPE html>
<html lang="id-ID">
<head>
  <script src="/portal/healthcare/patient/_portal.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="booking.confirm">Detail Janji</title>
  <link rel="stylesheet" href="/frontend/assets/css/app.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: var(--color-bg-main); color: var(--color-text-primary); }

    .hc-page { max-width: 540px; margin: 0 auto; padding: var(--spacing-xl); }
    .hc-page__title { font-size: var(--font-xl); font-weight: 800; margin-bottom: var(--spacing-lg); }

    .hc-card { background: var(--color-bg-card); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: var(--spacing-xl); margin-bottom: var(--spacing-lg); }
    .hc-card__row { display: flex; justify-content: space-between; align-items: center; padding: var(--spacing-sm) 0; border-bottom: 1px solid var(--color-border); font-size: var(--font-sm); }
    .hc-card__row:last-child { border: none; }
    .hc-card__label { color: var(--color-text-secondary); }
    .hc-card__value { font-weight: 600; }

    /* Status badge */
    .hc-badge { display: inline-block; padding: 2px 10px; border-radius: 999px; font-size: var(--font-xs); font-weight: 700; }
    .hc-badge--confirmed { background: rgba(37,99,235,0.12); color: #1d4ed8; }
    .hc-badge--checked_in { background: rgba(13,148,136,0.12); color: #0d9488; }
    .hc-badge--in_progress { background: rgba(234,88,12,0.12); color: #ea580c; }
    .hc-badge--completed { background: rgba(22,163,74,0.12); color: #16a34a; }
    .hc-badge--cancelled { background: rgba(220,38,38,0.12); color: #dc2626; }
    .hc-badge--no_show { background: rgba(100,116,139,0.12); color: #64748b; }

    .hc-actions { display: flex; gap: var(--spacing-md); flex-wrap: wrap; }
    .hc-btn { flex: 1; min-width: 120px; padding: var(--spacing-sm) var(--spacing-lg); border: none; border-radius: var(--radius-md); font-size: var(--font-sm); font-weight: 700; cursor: pointer; }
    .hc-btn--primary { background: var(--color-primary); color: var(--color-text-inverse); }
    .hc-btn--primary:hover { background: var(--color-primary-hover); }
    .hc-btn--danger { background: var(--color-danger, #dc2626); color: #fff; }
    .hc-btn--ghost { background: transparent; border: 1.5px solid var(--color-border); color: var(--color-text-secondary); }
    .hc-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* Modal */
    .hc-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 100; align-items: center; justify-content: center; }
    .hc-modal.open { display: flex; }
    .hc-modal__box { background: var(--color-bg-card); border-radius: var(--radius-lg); padding: var(--spacing-xl); width: 100%; max-width: 440px; margin: var(--spacing-md); }
    .hc-modal__title { font-size: var(--font-lg); font-weight: 700; margin-bottom: var(--spacing-lg); }
    .hc-modal__actions { display: flex; gap: var(--spacing-sm); margin-top: var(--spacing-lg); }

    .hc-field { margin-bottom: var(--spacing-md); }
    .hc-field label { display: block; font-size: var(--font-sm); font-weight: 600; color: var(--color-text-secondary); margin-bottom: var(--spacing-xs); }

    /* Slot mini-grid for reschedule */
    .hc-slot-grid { display: grid; grid-template-columns: 1fr 1fr; gap: var(--spacing-sm); max-height: 260px; overflow-y: auto; }
    .hc-slot-card { border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: var(--spacing-sm); cursor: pointer; font-size: var(--font-sm); }
    .hc-slot-card.selected { border-color: var(--color-primary); background: rgba(37,99,235,0.06); }
    .hc-slot-card:hover { border-color: var(--color-primary); }
    .hc-cal-mini { margin-bottom: var(--spacing-md); }
    .hc-cal-mini__header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--spacing-xs); font-size: var(--font-sm); }
    .hc-cal-mini__nav { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); font-size: var(--font-base); }
    .hc-cal-mini__grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .hc-cal-mini__dow { text-align: center; font-size: 10px; color: var(--color-text-secondary); font-weight: 600; }
    .hc-cal-mini__day { text-align: center; padding: 4px 0; font-size: var(--font-xs); cursor: pointer; border-radius: var(--radius-sm); }
    .hc-cal-mini__day.selected { background: var(--color-primary); color: var(--color-text-inverse); }
    .hc-cal-mini__day.disabled { color: var(--color-text-tertiary); cursor: not-allowed; }
    .hc-cal-mini__day.other { color: var(--color-text-tertiary); cursor: default; }
    .hc-cal-mini__day:hover:not(.disabled):not(.other):not(.selected) { background: rgba(37,99,235,0.1); }
  </style>
</head>
<body>
  <div class="hc-page">
    <div style="display:flex;align-items:center;gap:var(--spacing-md);margin-bottom:var(--spacing-lg);">
      <h1 class="hc-page__title" style="margin:0;" data-i18n="booking.confirm"></h1>
      <div data-locale-switcher style="margin-left:auto;"></div>
    </div>

    <div id="alert-container" style="margin-bottom:var(--spacing-md);"></div>

    <div class="hc-card" id="detail-card">
      <div style="text-align:center;padding:var(--spacing-xl);color:var(--color-text-secondary);" data-i18n="common.loading"></div>
    </div>

    <div class="hc-actions" id="action-buttons" style="display:none;">
      <button class="hc-btn hc-btn--primary" id="btn-reschedule" data-i18n="appointment.reschedule"></button>
      <button class="hc-btn hc-btn--danger" id="btn-cancel" data-i18n="appointment.cancel"></button>
    </div>

    <div id="cancelled-notice" style="display:none;padding:var(--spacing-lg);text-align:center;color:var(--color-text-secondary);" data-i18n="appointment.cancelled"></div>
  </div>

  <!-- Reschedule modal -->
  <div class="hc-modal" id="reschedule-modal" role="dialog" aria-modal="true">
    <div class="hc-modal__box">
      <h2 class="hc-modal__title" data-i18n="appointment.reschedule"></h2>
      <div class="hc-cal-mini" id="reschedule-cal">
        <div class="hc-cal-mini__header">
          <button class="hc-cal-mini__nav" id="rs-cal-prev">&lsaquo;</button>
          <span id="rs-cal-month"></span>
          <button class="hc-cal-mini__nav" id="rs-cal-next">&rsaquo;</button>
        </div>
        <div class="hc-cal-mini__grid" id="rs-cal-dow">
          <div class="hc-cal-mini__dow">S</div><div class="hc-cal-mini__dow">S</div>
          <div class="hc-cal-mini__dow">R</div><div class="hc-cal-mini__dow">K</div>
          <div class="hc-cal-mini__dow">J</div><div class="hc-cal-mini__dow">S</div>
          <div class="hc-cal-mini__dow">M</div>
        </div>
        <div class="hc-cal-mini__grid" id="rs-cal-days"></div>
      </div>
      <div id="rs-slot-loading" style="text-align:center;font-size:var(--font-sm);color:var(--color-text-secondary);display:none;" data-i18n="common.loading"></div>
      <div class="hc-slot-grid" id="rs-slot-grid"></div>
      <div class="hc-modal__actions">
        <button class="hc-btn hc-btn--ghost" id="btn-cancel-rs" data-i18n="common.cancel"></button>
        <button class="hc-btn hc-btn--primary" id="btn-confirm-rs" data-i18n="common.confirm" disabled></button>
      </div>
    </div>
  </div>

  <!-- Cancel confirmation modal -->
  <div class="hc-modal" id="cancel-modal" role="dialog" aria-modal="true">
    <div class="hc-modal__box">
      <h2 class="hc-modal__title" data-i18n="appointment.cancel"></h2>
      <p style="font-size:var(--font-sm);color:var(--color-text-secondary);margin-bottom:var(--spacing-md);" data-i18n="appointment.cancel_confirm"></p>
      <div id="cancel-policy" style="font-size:var(--font-sm);color:var(--color-text-secondary);background:var(--color-bg-main);border-radius:var(--radius-sm);padding:var(--spacing-sm);margin-bottom:var(--spacing-md);"></div>
      <div class="hc-modal__actions">
        <button class="hc-btn hc-btn--ghost" id="btn-close-cancel" data-i18n="common.back"></button>
        <button class="hc-btn hc-btn--danger" id="btn-confirm-cancel" data-i18n="appointment.cancel"></button>
      </div>
    </div>
  </div>
  <script type="module" src="./appointment-detail.js"></script>
</body>
</html>
