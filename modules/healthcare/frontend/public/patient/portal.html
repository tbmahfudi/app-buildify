<!DOCTYPE html>
<html lang="id">
<head>
  <script src="/portal/healthcare/patient/_portal.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title data-i18n="portal.title"></title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:var(--color-bg,#f5f5f5);color:var(--color-text,#1a1a1a);max-width:480px;margin:0 auto;min-height:100vh;padding-bottom:64px}
    :root{--color-primary:#007bff;--color-primary-light:#e8f0fe;--color-bg:#f5f5f5;--color-surface:#fff;--color-text:#1a1a1a;--color-muted:#6b7280;--color-border:#e5e7eb;--color-success:#16a34a;--color-error:#dc2626;--color-warning:#f59e0b;--color-badge-upcoming:#dbeafe;--color-badge-past:#f3f4f6;--color-badge-completed:#dcfce7;--color-badge-cancelled:#fee2e2}
    .flex-alert{display:flex;align-items:center;gap:8px;padding:12px 16px;border-radius:8px;font-size:14px;margin:8px 16px}
    .flex-alert.success{background:var(--color-badge-completed);color:var(--color-success)}
    .flex-alert.error{background:var(--color-badge-cancelled);color:var(--color-error)}
    .skeleton{background:linear-gradient(90deg,var(--color-border) 25%,#f0f0f0 50%,var(--color-border) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite;border-radius:6px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--color-surface);border-top:1px solid var(--color-border);display:flex;z-index:100}
    .bottom-nav a{flex:1;display:flex;flex-direction:column;align-items:center;padding:8px 4px;font-size:11px;color:var(--color-muted);text-decoration:none;gap:2px}
    .bottom-nav a.active{color:var(--color-primary)}
    .bottom-nav a svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8}
    
    .page-header{padding:16px;background:var(--color-surface);border-bottom:1px solid var(--color-border)}
    .profile-card{background:var(--color-surface);margin:12px;border-radius:12px;padding:16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .avatar{width:48px;height:48px;border-radius:50%;background:var(--color-primary-light);display:flex;align-items:center;justify-content:center;color:var(--color-primary);font-weight:700;font-size:20px;flex-shrink:0}
    .profile-card .name{font-weight:600;font-size:16px}
    .profile-card .phone{font-size:13px;color:var(--color-muted)}
    .summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:0 12px 12px}
    .summary-card{background:var(--color-surface);border-radius:12px;padding:14px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-decoration:none;color:inherit;display:block}
    .summary-card .label{font-size:12px;color:var(--color-muted);margin-bottom:6px}
    .summary-card .value{font-size:22px;font-weight:700;color:var(--color-primary)}
    .skel-card{height:72px}
    .skel-line{height:16px;width:60%;margin-bottom:6px}
    .skel-val{height:28px;width:40%}

  </style>
</head>
<body>
<div id="alert-area"></div>

<div class="page-header">
  <h1 style="font-size:18px;font-weight:700" data-i18n="portal.title"></h1>
</div>

<div id="profile-card" class="profile-card">
  <div class="avatar skeleton skel-card" style="width:48px;height:48px"></div>
  <div style="flex:1">
    <div class="skeleton skel-line" style="margin-bottom:6px"></div>
    <div class="skeleton" style="height:12px;width:40%"></div>
  </div>
</div>

<a id="household-bar" href="/patient/household" style="display:none;text-decoration:none;color:inherit;margin:0 12px 8px;padding:10px 14px;background:var(--color-surface);border-radius:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);align-items:center;justify-content:space-between;gap:8px"></a>

<div id="waitlist-banner-area"></div>

<div class="summary-grid" id="summary-grid">
  <div class="summary-card"><div class="skeleton skel-line"></div><div class="skeleton skel-val"></div></div><div class="summary-card"><div class="skeleton skel-line"></div><div class="skeleton skel-val"></div></div><div class="summary-card"><div class="skeleton skel-line"></div><div class="skeleton skel-val"></div></div><div class="summary-card"><div class="skeleton skel-line"></div><div class="skeleton skel-val"></div></div>
</div>


<nav class="bottom-nav">
  <a href="/patient/portal" class="active">
    <svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1z"/><path d="M9 21V12h6v9"/></svg>
    <span data-i18n="portal.title"></span>
  </a>
  <a href="/patient/appointments" class="">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    <span data-i18n="appointments.title"></span>
  </a>
  <a href="/patient/records" class="">
    <svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><path d="M9 12h6M9 16h4"/></svg>
    <span data-i18n="records.title"></span>
  </a>
  <a href="/patient/profile" class="">
    <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
    <span data-i18n="profile.title"></span>
  </a>
</nav>
<script src="waitlist-banner.js"></script>
<script src="portal.js"></script>
</body>
</html>
