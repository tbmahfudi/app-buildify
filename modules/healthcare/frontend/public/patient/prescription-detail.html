<!DOCTYPE html>
<html lang="id">
<head>
  <script src="/portal/healthcare/patient/_portal.js"></script>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detail Resep</title>
  <link rel="stylesheet" href="/static/css/platform.css"/>
  <style>
    .back-btn{background:none;border:none;cursor:pointer;color:var(--color-primary);font-size:1rem;padding:0;margin-bottom:16px;display:flex;align-items:center;gap:4px;}
    .card{background:var(--color-surface);border:1px solid var(--color-border);border-radius:10px;padding:16px;margin-bottom:12px;}
    .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:.75rem;font-weight:600;}
    .badge-pending{background:var(--color-warning-light);color:var(--color-warning-dark);}
    .badge-dispensed{background:var(--color-success-light);color:var(--color-success);}
    .badge-partial{background:var(--color-info-light);color:var(--color-info);}
    .badge-cancelled{background:var(--color-muted);color:var(--color-text-secondary);}
    .notice{background:var(--color-info-light);color:var(--color-info-dark);border:1px solid var(--color-info);border-radius:8px;padding:12px 16px;font-size:.875rem;margin-top:16px;}
    .line-card{border-bottom:1px solid var(--color-border);padding:12px 0;}
    .line-card:last-child{border-bottom:none;}
    .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--color-surface);border-top:1px solid var(--color-border);display:flex;justify-content:space-around;padding:8px 0;z-index:100;}
    .bottom-nav a{display:flex;flex-direction:column;align-items:center;font-size:.7rem;color:var(--color-text-secondary);text-decoration:none;gap:2px;}
    .bottom-nav a.active{color:var(--color-primary);}
    main{padding-bottom:72px;}
  </style>
</head>
<body>
<main class="main-content" style="padding:16px;">
  <button class="back-btn" onclick="location.href='/patient/prescriptions'">&#8592; Kembali</button>
  <h1 style="margin-bottom:16px;">Detail Resep</h1>
  <div class="card" id="rx-header"><div style="color:var(--color-text-secondary);">Memuat&hellip;</div></div>
  <div class="card">
    <h3 style="margin:0 0 12px;">Obat yang Diresepkan</h3>
    <div id="lines-container"></div>
  </div>
  <div class="notice" data-i18n="pharmacy.follow_instructions">
    &#128138; Ikuti petunjuk dokter untuk penggunaan obat ini
  </div>
</main>
<nav class="bottom-nav">
  <a href="/patient/">&#127968;<span>Beranda</span></a>
  <a href="/patient/appointments">&#128197;<span>Janji</span></a>
  <a href="/patient/prescriptions" class="active">&#128138;<span>Resep</span></a>
  <a href="/patient/records">&#128203;<span>Rekam Medis</span></a>
  <a href="/patient/profile">&#128100;<span>Profil</span></a>
</nav>
<script src="/modules/healthcare/frontend/patient/prescription-detail.js"></script>
</body>
</html>
